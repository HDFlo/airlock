on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      airlock-release-created: ${{ steps.release.outputs.release_created }}
      airlock-tag-name: ${{ steps.release.outputs.tag_name }}
      airlock-version: ${{ steps.release.outputs.version }}
      design-system-release-created: ${{ steps.release.outputs['packages/design-system--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Update Cargo.lock on release PR ─────────────────────────
      - name: Update Cargo.lock on release PR
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_BRANCH=$(echo '${{ steps.release.outputs.prs }}' | jq -r '.[0].headBranchName')
          git clone --branch "$PR_BRANCH" \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" \
            "$RUNNER_TEMP/release-pr"
          cd "$RUNNER_TEMP/release-pr"
          cargo update --workspace
          if git diff --quiet Cargo.lock; then
            echo "Cargo.lock already up to date"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add Cargo.lock
            git commit -m "chore: update Cargo.lock"
            git push
          fi

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs['packages/design-system--release_created'] }}

      - uses: actions/setup-node@v6
        if: ${{ steps.release.outputs['packages/design-system--release_created'] }}
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
        if: ${{ steps.release.outputs['packages/design-system--release_created'] }}

      - run: npm run build --workspace @airlock-hq/design-system
        if: ${{ steps.release.outputs['packages/design-system--release_created'] }}

      - run: npm publish --access public --provenance --workspace @airlock-hq/design-system
        if: ${{ steps.release.outputs['packages/design-system--release_created'] }}

  build-macos:
    needs: release-please
    if: ${{ needs.release-please.outputs.airlock-release-created == 'true' }}
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.release-please.outputs.airlock-version }}
      TAG_NAME: ${{ needs.release-please.outputs.airlock-tag-name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Install frontend dependencies
        run: npm ci

      - name: Build design system and frontend
        run: make design-system-build frontend-build-force

      # ── Build Tauri app (universal binary) ────────────────────────
      # Use separate target dir to avoid cache thrashing with CLI builds
      # (Tauri enables tauri/custom-protocol which conflicts with workspace builds)
      - name: Build Tauri universal app
        run: |
          cd crates/airlock-app
          CARGO_TARGET_DIR=$GITHUB_WORKSPACE/target/tauri cargo tauri build --target universal-apple-darwin

      # ── Build CLI + daemon for both architectures ─────────────────
      - name: Build CLI and daemon (aarch64)
        run: |
          cargo build --release \
            --target aarch64-apple-darwin \
            --workspace --exclude airlock-app

      - name: Build CLI and daemon (x86_64)
        run: |
          cargo build --release \
            --target x86_64-apple-darwin \
            --workspace --exclude airlock-app

      # ── Create universal CLI + daemon binaries ────────────────────
      - name: Create universal binaries
        run: |
          mkdir -p target/universal-apple-darwin/release
          for bin in airlock airlockd; do
            lipo -create \
              target/aarch64-apple-darwin/release/$bin \
              target/x86_64-apple-darwin/release/$bin \
              -output target/universal-apple-darwin/release/$bin
          done

      # ── Embed CLI + daemon into .app bundle ───────────────────────
      - name: Embed binaries into app bundle
        run: |
          APP_BUNDLE="target/tauri/universal-apple-darwin/release/bundle/macos/Airlock.app"
          MACOS_DIR="$APP_BUNDLE/Contents/MacOS"

          cp target/universal-apple-darwin/release/airlock "$MACOS_DIR/"
          cp target/universal-apple-darwin/release/airlockd "$MACOS_DIR/"

          # Ad-hoc sign (no Developer ID yet — users must remove quarantine manually)
          codesign --force --sign - "$MACOS_DIR/airlock"
          codesign --force --sign - "$MACOS_DIR/airlockd"
          codesign --force --deep --sign - "$APP_BUNDLE"

      # ── Create DMG ────────────────────────────────────────────────
      - name: Create DMG
        run: |
          APP_BUNDLE="target/tauri/universal-apple-darwin/release/bundle/macos/Airlock.app"
          DMG_NAME="Airlock-${VERSION}-universal.dmg"
          DMG_PATH="target/${DMG_NAME}"

          hdiutil create -volname "Airlock" -srcfolder "$APP_BUNDLE" \
            -ov -format UDZO "$DMG_PATH"

          echo "DMG_PATH=$DMG_PATH" >> $GITHUB_ENV
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      # ── Upload DMG to GitHub Release ──────────────────────────────
      - name: Upload DMG to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$TAG_NAME" "$DMG_PATH" \
            --clobber

      # ── Compute SHA256 ────────────────────────────────────────────
      - name: Compute DMG SHA256
        id: sha256
        run: |
          SHA256=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      # ── Update Homebrew tap ───────────────────────────────────────
      - name: Update Homebrew Cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SHA256: ${{ steps.sha256.outputs.sha256 }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/airlock-hq/homebrew-airlock.git" \
            "$RUNNER_TEMP/homebrew-airlock"

          mkdir -p "$RUNNER_TEMP/homebrew-airlock/Casks"

          cat > "$RUNNER_TEMP/homebrew-airlock/Casks/airlock.rb" << CASK_EOF
          cask "airlock" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/airlock-hq/airlock/releases/download/${TAG_NAME}/Airlock-${VERSION}-universal.dmg"
            name "Airlock"
            desc "All slop must die. Airlock is where every git push turns into a slop-free PR."
            homepage "https://github.com/airlock-hq/airlock"

            depends_on macos: ">= :ventura"

            app "Airlock.app"
            binary "#{appdir}/Airlock.app/Contents/MacOS/airlock"
            binary "#{appdir}/Airlock.app/Contents/MacOS/airlockd"

            postflight do
              system_command "/usr/bin/xattr",
                            args: ["-cr", "#{appdir}/Airlock.app"]
              system_command "#{appdir}/Airlock.app/Contents/MacOS/airlock",
                            args: ["daemon", "install"],
                            must_succeed: false
            end

            uninstall_preflight do
              system_command "#{appdir}/Airlock.app/Contents/MacOS/airlock",
                            args: ["daemon", "stop"],
                            must_succeed: false
              system_command "/bin/rm",
                            args: ["-f", File.expand_path("~/Library/LaunchAgents/dev.airlock.daemon.plist")],
                            must_succeed: false
            end

            zap trash: "~/.airlock"
          end
          CASK_EOF

          cd "$RUNNER_TEMP/homebrew-airlock"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/airlock.rb
          git commit -m "airlock ${VERSION}"
          git push
