description: Rebase onto upstream to handle drift and sync with default branch
shell: bash
continue-on-error: false
run: |
  set -euo pipefail

  # --- Helper: agent-assisted conflict resolution ---
  # Usage: resolve_conflicts <target_ref>
  # Returns 0 if conflicts resolved, 1 if agent failed
  resolve_conflicts() {
    local TARGET_REF="$1"

    CONFLICTED_FILES=$(git diff --name-only --diff-filter=U 2>/dev/null || true)

    if [ -z "$CONFLICTED_FILES" ]; then
      echo "No conflicted files found but rebase failed. Aborting."
      git rebase --abort
      return 1
    fi

    PROMPT="You are a software developer assistant called Airlock. Your job here is to resolve merge conflicts during a git rebase operation.

  The local branch is being rebased onto ${TARGET_REF}.
  Local changes are the user's un-forwarded commits; incoming changes are from upstream.

  ## Conflicted Files
  $CONFLICTED_FILES

  ## Your Task

  1. Run git status to understand the current state of the repo.
  2. Read each conflicted file and understand the conflict markers
  3. Resolve each conflict by choosing the correct resolution that preserves both the local intent and upstream changes
  4. After resolving each file, run \`git add <file>\` to mark it resolved
  5. After all conflicts are resolved, run \`git rebase --continue\`
  6. If further conflicts arise during continue, resolve those too

  ## Important Notes
  - Prefer preserving both sets of changes when possible
  - If changes are incompatible, prefer the upstream version but preserve local intent
  - Do NOT run \`git rebase --abort\` — we want to complete the rebase

  ## Final Output
  When done, respond with JSON:
  {
    \"verdict\": \"pass\" | \"fail\",
    \"summary\": \"Brief description of how conflicts were resolved\",
    \"files_resolved\": [\"list\", \"of\", \"resolved\", \"files\"]
  }"

    SCHEMA='{"type":"object","properties":{"verdict":{"type":"string","enum":["pass","fail"]},"summary":{"type":"string"},"files_resolved":{"type":"array","items":{"type":"string"}}},"required":["verdict","summary"]}'

    RESPONSE=$(airlock exec agent "$PROMPT" --output-schema "$SCHEMA")
    VERDICT=$(echo "$RESPONSE" | airlock exec json verdict)

    if [ "$VERDICT" = "pass" ]; then
      echo "Agent successfully resolved rebase conflicts."
      return 0
    else
      echo "Agent failed to resolve rebase conflicts. Aborting rebase."
      git rebase --abort 2>/dev/null || true
      return 1
    fi
  }

  # --- Helper: attempt rebase onto a target ref ---
  # Usage: try_rebase <target_ref>
  # Returns 0 if rebase succeeded (or was unnecessary), 1 if it failed
  try_rebase() {
    local TARGET_REF="$1"

    LOCAL_SHA=$(git rev-parse HEAD)
    TARGET_SHA=$(git rev-parse "$TARGET_REF")

    if [ "$LOCAL_SHA" = "$TARGET_SHA" ]; then
      echo "Already up-to-date with $TARGET_REF."
      return 0
    fi

    # Already ahead — target is ancestor of local
    if git merge-base --is-ancestor "$TARGET_REF" HEAD; then
      echo "Already ahead of $TARGET_REF — no rebase needed."
      return 0
    fi

    # Can fast-forward — local is ancestor of target
    if git merge-base --is-ancestor HEAD "$TARGET_REF"; then
      echo "Fast-forwarding to $TARGET_REF..."
      git reset --hard "$TARGET_REF"
      return 0
    fi

    # Diverged — need to rebase
    echo "Branch has diverged from $TARGET_REF. Rebasing..."

    if git rebase "$TARGET_REF"; then
      echo "Rebase onto $TARGET_REF completed cleanly."
      return 0
    fi

    # Rebase had conflicts — use agent to resolve
    echo "Rebase onto $TARGET_REF has conflicts. Invoking agent for resolution..."
    resolve_conflicts "$TARGET_REF"
  }

  echo "Fetching latest upstream state..."
  git fetch origin

  BRANCH=$(git rev-parse --abbrev-ref HEAD)
  DEFAULT_BRANCH="${AIRLOCK_DEFAULT_BRANCH:-main}"
  UPSTREAM_REF="origin/${BRANCH}"
  DEFAULT_REF="origin/${DEFAULT_BRANCH}"

  # ==========================================
  # Phase 1: Sync with same-branch upstream
  # ==========================================
  echo ""
  echo "=== Phase 1: Sync with same-branch upstream (${UPSTREAM_REF}) ==="

  if ! git rev-parse --verify "$UPSTREAM_REF" >/dev/null 2>&1; then
    echo "No upstream ref $UPSTREAM_REF found — this is a new branch, skipping phase 1."
  else
    if ! try_rebase "$UPSTREAM_REF"; then
      echo "Phase 1 failed: could not rebase onto $UPSTREAM_REF."
      exit 1
    fi
    echo "Phase 1 complete."
  fi

  # ==========================================
  # Phase 2: Rebase onto default branch
  # ==========================================
  if [ "$BRANCH" = "$DEFAULT_BRANCH" ]; then
    echo ""
    echo "=== Phase 2: Skipped (already on default branch '$DEFAULT_BRANCH') ==="
    exit 0
  fi

  echo ""
  echo "=== Phase 2: Rebase onto default branch (${DEFAULT_REF}) ==="

  # Save phase 1 result so we can fall back on phase 2 failure
  PHASE1_HEAD=$(git rev-parse HEAD)

  if ! try_rebase "$DEFAULT_REF"; then
    echo ""
    echo "WARNING: Could not rebase onto $DEFAULT_REF. Falling back to phase 1 result."
    echo "The branch is synced with $UPSTREAM_REF but not rebased onto $DEFAULT_BRANCH."
    echo "You may encounter conflicts when merging to $DEFAULT_BRANCH."
    git reset --hard "$PHASE1_HEAD"
    exit 0
  fi

  echo "Phase 2 complete. Branch is up-to-date with $DEFAULT_REF."
