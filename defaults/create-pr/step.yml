description: Create a pull/merge request using an AI agent that determines the appropriate method
shell: bash
run: |
  set -euo pipefail

  # Extract branch name (strip refs/heads/ prefix if present)
  BRANCH="${AIRLOCK_BRANCH#refs/heads/}"

  # Skip PR creation when pushing to the default branch (e.g. main→main is nonsensical)
  DEFAULT_BRANCH="${AIRLOCK_DEFAULT_BRANCH:-main}"
  if [[ "$BRANCH" == "$DEFAULT_BRANCH" ]]; then
    echo "Skipping PR creation: pushing to default branch '$DEFAULT_BRANCH'"
    exit 0
  fi

  # Detect platform and check authentication setup
  if [[ "$AIRLOCK_UPSTREAM_URL" == *"github.com"* ]]; then
    if ! command -v gh &>/dev/null; then
      echo "Skipping: 'gh' CLI is not installed. Install it from https://cli.github.com"
      exit 0
    fi
    if ! gh auth status &>/dev/null 2>&1; then
      echo "Skipping: 'gh' CLI is not authenticated. Run 'gh auth login' to authenticate."
      exit 0
    fi
  elif [[ "$AIRLOCK_UPSTREAM_URL" == *"gitlab"* ]]; then
    if ! command -v glab &>/dev/null; then
      echo "Skipping: 'glab' CLI is not installed. Install it from https://gitlab.com/gitlab-org/cli"
      exit 0
    fi
    if ! glab auth status &>/dev/null 2>&1; then
      echo "Skipping: 'glab' CLI is not authenticated. Run 'glab auth login' to authenticate."
      exit 0
    fi
  elif [[ "$AIRLOCK_UPSTREAM_URL" == *"bitbucket.org"* ]]; then
    BB_READY=false

    if command -v bb &>/dev/null && bb auth status &>/dev/null 2>&1; then
      BB_READY=true
      echo "Bitbucket auth: using bb CLI session"
    fi

    if [[ "$BB_READY" != "true" ]]; then
      if [[ -n "${BITBUCKET_TOKEN:-}" ]]; then
        if curl -fsS --max-time 5 -H "Authorization: Bearer $BITBUCKET_TOKEN" "https://api.bitbucket.org/2.0/user" >/dev/null; then
          BB_READY=true
          echo "Bitbucket auth: using BITBUCKET_TOKEN"
        else
          echo "Skipping: BITBUCKET_TOKEN is set but failed validation against https://api.bitbucket.org/2.0/user"
          exit 0
        fi
      elif [[ -n "${BITBUCKET_USERNAME:-}" && -n "${BITBUCKET_APP_PASSWORD:-}" ]]; then
        if curl -fsS --max-time 5 --user "$BITBUCKET_USERNAME:$BITBUCKET_APP_PASSWORD" "https://api.bitbucket.org/2.0/user" >/dev/null; then
          BB_READY=true
          echo "Bitbucket auth: using BITBUCKET_USERNAME + BITBUCKET_APP_PASSWORD"
        else
          echo "Skipping: BITBUCKET_USERNAME + BITBUCKET_APP_PASSWORD are set but failed validation against https://api.bitbucket.org/2.0/user"
          exit 0
        fi
      fi
    fi

    if [[ "$BB_READY" != "true" ]]; then
      echo "Skipping: Bitbucket Cloud auth is not configured. Use one of:"
      echo "  1) bb auth login"
      echo "  2) BITBUCKET_TOKEN"
      echo "  3) BITBUCKET_USERNAME + BITBUCKET_APP_PASSWORD"
      exit 0
    fi
  else
    echo "Skipping: this provider is not supported for automatic pull request creation yet."
    exit 0
  fi

  # Build prompt for agent
  PROMPT="You are a software developer assistant called Airlock. You are creating a pull request (or merge request) for a code change.

  ## Context

  **Upstream URL:** $AIRLOCK_UPSTREAM_URL
  **Branch:** $BRANCH
  **Artifacts:** $AIRLOCK_ARTIFACTS

  ## Authentication Methods Available

  - GitHub: gh CLI is installed and authenticated
  - GitLab: glab CLI is installed and authenticated
  - Bitbucket Cloud:
    - Preferred: bb CLI (if available/authenticated)
    - API fallback: BITBUCKET_TOKEN
    - API fallback: BITBUCKET_USERNAME + BITBUCKET_APP_PASSWORD

  ## Your Task

  1. **Identify the platform** - Based on the upstream URL, determine the Git hosting platform:
     - GitHub (github.com)
     - GitLab (gitlab.com or self-hosted)
     - Bitbucket Cloud (bitbucket.org)
     - Other platforms

  2. **Detect the default branch** - Figure out the target branch (usually main or master)

  3. **Inspect artifacts** - Look for existing artifacts to see useful information that can be put in PR title/description

  4. **Create the PR/MR** - Use the appropriate CLI or API to create the pull/merge request
     - For Bitbucket Cloud, prefer bb CLI when authenticated; otherwise use API credentials from environment.

  5. **Return the result** - Provide the PR/MR URL if successful, or explain the error

  ## PR/MR Content
  - Check if \`$AIRLOCK_ARTIFACTS/description.json\` exists. If it does, use it:
    - Use the \`title\` field as the PR title
    - Use the \`body\` field as the basis for the PR description
    - If a \`mermaid_diagram\` field is present, include it in the PR description as a fenced mermaid code block (\\\`\\\`\\\`mermaid ... \\\`\\\`\\\`). You MUST strip all Mermaid styling before including it: remove all \`classDef\` lines, \`class ... subgraphStyle\` lines, and \`:::className\` suffixes from nodes. GitHub/GitLab/Bitbucket render Mermaid with their own dark/light theming, so custom styles break that.
  - If description.json does not exist, generate a title and description from the branch name and commit history
  - Do NOT add a signature for who created the PR/MR
  - Check if \`\$AIRLOCK_ARTIFACTS/risk_assessment.json\` exists. If it does, include a **Risk Assessment** line in the PR description after the Summary section. Format it as:
    - 🟢 for low risk, 🟡 for medium risk, 🔴 for high risk
    - Follow the emoji with the \`risk_level\` value and the \`summary\` field as a one-liner
    - Example: \"**Risk Assessment:** 🟢 Low — Minor copy change with no logic impact\"
  - The description should have these sections:
    - Summary (of the rationale behind the change)
    - Risk Assessment (only if risk_assessment.json exists — one line with emoji + level + summary)
    - Architecture (only if a mermaid diagram is available from description.json)
    - Key changes made
    - How was this tested

  ## Important Notes
  - The branch has already been pushed to the remote
  - If the PR/MR already exists, update its title/description and return its URL instead of failing
  - If the required CLI is not installed and there's no alternative way to create the PR, report an error

  ## Final Output
  When you are done, respond with JSON in this exact format:
  {
    \"success\": true | false,
    \"pr_url\": \"URL of the created or existing PR/MR (null if failed)\",
    \"pr_number\": number or null,
    \"platform\": \"github\" | \"gitlab\" | \"bitbucket\" | \"azure\" | \"other\",
    \"summary\": \"Brief summary of what happened\",
    \"error\": \"Error message if failed (null if successful)\"
  }"

  # Define output schema
  SCHEMA='{"type":"object","properties":{"success":{"type":"boolean"},"pr_url":{"type":["string","null"]},"pr_number":{"type":["integer","null"]},"platform":{"type":"string"},"summary":{"type":"string"},"error":{"type":["string","null"]}},"required":["success","platform","summary"]}'

  echo "Starting agent to create pull request..."
  echo "Upstream: $AIRLOCK_UPSTREAM_URL"
  echo "Branch: $BRANCH"

  # Run the agent
  RESPONSE=$(airlock exec agent "$PROMPT" --output-schema "$SCHEMA")

  # Parse the response
  SUCCESS=$(echo "$RESPONSE" | airlock exec json success)
  PR_URL=$(echo "$RESPONSE" | airlock exec json pr_url 2>/dev/null || echo "")
  PR_NUMBER=$(echo "$RESPONSE" | airlock exec json pr_number 2>/dev/null || echo "null")
  PLATFORM=$(echo "$RESPONSE" | airlock exec json platform)
  SUMMARY=$(echo "$RESPONSE" | airlock exec json summary)
  ERROR=$(echo "$RESPONSE" | airlock exec json error 2>/dev/null || echo "")

  echo "Platform: $PLATFORM"
  echo "Success: $SUCCESS"
  echo "Summary: $SUMMARY"

  # Prepare artifacts directory
  mkdir -p "$AIRLOCK_ARTIFACTS"

  # Persist the full agent response as an artifact for the UI
  echo "$RESPONSE" > "$AIRLOCK_ARTIFACTS/pr_result.json"

  # Determine exit code
  if [[ "$SUCCESS" == "true" ]]; then
      EXIT_CODE=0
      echo "PR URL: $PR_URL"
  else
      EXIT_CODE=1
      echo "Error: $ERROR"
  fi

  exit $EXIT_CODE
